server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5433/orderdb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: never
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app:
  jwt:
    # Must match the secret used by user-service to sign tokens
    secret: ${JWT_SECRET:3d8f2a1b9c4e7f0d6a5b2c8e1f4d7a0b3e6c9f2a5b8d1e4f7a0c3b6e9d2f5a8}

logging:
  level:
    com.ecom.orderservice: DEBUG
